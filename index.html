
<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h1>Menu</h1>
    <ul>
  <li onclick="setFilter('inbox', this)">
    <i class="fa-regular fa-envelope"></i>
    <span>Inbox</span>
  </li>

  <li onclick="setFilter('today', this)">
    <i class="fa-regular fa-calendar"></i>
    <span>Today</span>
  </li>

  <li onclick="setFilter('upcoming', this)">
    <i class="fa-solid fa-calendar-day"></i>
    <span>Upcoming</span>
  </li>

  <li onclick="setFilter('important', this)">
    <i class="fa-solid fa-star"></i>
    <span>Important</span>
  </li>

    <li onclick="setFilter('completed', this)">
    <i class="fa-solid fa-list-check"></i>
    <span>Completed</span>
   </li>

     <li onclick="setFilter('trash', this)">
    <i class="fa-solid fa-trash"></i>
    <span>Trash</span>
    </li>

    <!-- search task input -->
     <li onclick="setFilter('search', this)">
      <i class="fa-solid fa-magnifying-glass"></i>
        <span>Search here</span>
      </li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <h1 id="pageTitle">Tasks Manager </h1>

    <!-- Add Task -->
    <div id="add-task">
      <input type="text" id="taskText" placeholder="Add new task...">
      <input type="datetime-local" id="taskTime" required />
      <button onClick="addTask()">Add Task</button>
    </div>
    
      <!-- search input -->
    <div id="search-container" style="display:none;">
      <input id="searchBox" type="text" placeholder="Search task here..." oninput="handleSearch('search',this.value)"/>  
      <button onclick="" id="search-btn" >Search</button> 
       <!-- oninput- runs every time when user types -->
    </div>


       <ul id="display_taskList">
        <!-- new task list will be add here -->
      </ul>
      upcoming and today or any other filter about future task
   </div>


  <!-- Schedule -->
  <div class="schedule">
    <h2>Schedule</h2>

    <div class="card">
      <p>08:00 - 09:00</p>
      <h3>Product Review</h3>
    </div>

    <div class="card">
      <p>10:00 - 11:00</p>
      <h3>Design Meeting</h3>
    </div>
  </div>
</div>

<script src="./js/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animateplus/2.0.1/animateplus.min.js"></script>
</body>
</html>
